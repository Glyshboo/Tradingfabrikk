mode: paper
symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "LINKUSDT"]

account:
  equity: 10000

engine:
  stale_after_sec: 15
  decision_interval_sec: 2
  profile_update_sec: 30
  recovery_wait_sec: 1

recovery:
  resume_cooldown_sec: 5
  allow_hard_auto_resume: false
  hard_resume_cooldown_sec: 45
  require_backfill: true

micro_live:
  enabled: true
  max_symbols: 1
  max_total_exposure_notional: 1500
  risk_multiplier: 0.35

sizing:
  base_qty: 0.01

paper_smoke:
  interval: 1h
  bars: 48
  min_trades: 3
  min_pnl: -2.0

scheduler:
  enabled: false
  hot_window_sec: 600

risk:
  max_daily_loss: 300
  max_weekly_loss: 700
  max_drawdown_pct: 0.2
  max_total_exposure_notional: 15000
  max_leverage: 5
  max_open_positions: 5
  per_symbol_exposure_cap:
    BTCUSDT: 8000
    ETHUSDT: 6000
    SOLUSDT: 3000
    LINKUSDT: 2000
  correlation_clusters:
    high_corr_l1: ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
  correlation_direction_cap: 2

selector:
  base_edge:
    TrendCore: 0.08
    RangeMR: 0.05
    BreakoutRetest: 0.035
    TrendPullback: 0.03
    FailedBreakoutFade: 0.025
  family_cold_start_bias:
    BreakoutRetest: 0.008
    TrendPullback: 0.007
    FailedBreakoutFade: 0.006
  family_cold_start_max_samples: 8
  performance_memory:
    cold_start_uncertainty_penalty: 0.008
    prior_sample_strength: 4

strategy_configs:
  TrendCore:
    tc_safe:
      atr_stop_mult: 2.0
      time_stop_bars: 12
      base_confidence: 0.58
  RangeMR:
    rmr_safe:
      rsi_low: 35
      rsi_high: 65
      base_confidence: 0.52

strategy_profiles:
  BTCUSDT:
    TREND_UP: [["TrendCore", "tc_safe"]]
    TREND_DOWN: [["TrendCore", "tc_safe"]]
    RANGE: [["RangeMR", "rmr_safe"]]
  ETHUSDT:
    TREND_UP: [["TrendCore", "tc_safe"]]
    TREND_DOWN: [["TrendCore", "tc_safe"]]
    RANGE: [["RangeMR", "rmr_safe"]]
  SOLUSDT:
    TREND_UP: [["TrendCore", "tc_safe"]]
    TREND_DOWN: [["TrendCore", "tc_safe"]]
    RANGE: [["RangeMR", "rmr_safe"]]
  LINKUSDT:
    TREND_UP: [["TrendCore", "tc_safe"]]
    TREND_DOWN: [["TrendCore", "tc_safe"]]
    RANGE: [["RangeMR", "rmr_safe"]]

telemetry:
  audit_db: runtime/audit.db
  status_file: runtime/status.json

logging:
  level: INFO

state:
  engine_state_file: runtime/engine_state.json
  data_state_file: runtime/data_state.json

review:
  queue_file: runtime/review_queue.json
  candidate_registry_file: runtime/candidates_registry.json
  server:
    host: 127.0.0.1
    port: 8787
    auto_open_browser: true

llm_research:
  # Optional/legacy workflow: internal provider API calls.
  # Recommended default is manual roundtrip via runtime/llm_exports/paste_to_llm.md.
  enabled: false
  provider: codex
  fallback_provider: claude
  mode: advisory
  trigger:
    manual: true
    weekly_review: true
    performance_drop: true
  budgets:
    max_calls_per_day: 6
    max_calls_per_week: 20
  approvals:
    live_promotion_required: true
  openai_model: gpt-4o-mini
  anthropic_model: claude-3-5-sonnet-latest

auto_research:
  enabled: true
  artifact_file: runtime/auto_research_last_report.json
  triggers:
    research_schedule_hours: 24
    performance_drop_window_hours: 12
    performance_drop_threshold: -120
    min_performance_observations: 10
    min_paper_trades_before_research: 8
    regime_shift_trigger: true
    challenger_failure_streak: 4
    cooldown_hours: 6
  llm:
    # Optional/legacy internal LLM step. Keep disabled for standard workflow.
    enabled: false
    run_after_deterministic: false

bootstrap:
  strategy_idea_library_dir: strategy_ideas
  enabled: true

exports:
  enabled: true
  output_dir: runtime/llm_exports
  state_file: runtime/llm_exports/refresh_state.json
  refresh_on_research: true
  refresh_on_auto_research: true
  refresh_on_candidate_change: true
  refresh_on_challenger_eval: true
  refresh_on_schedule: true
  min_refresh_interval_sec: 900
  schedule_interval_sec: 1800

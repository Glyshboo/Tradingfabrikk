bars: 480

symbols: [BTCUSDT, ETHUSDT, SOLUSDT]
regimes: [TREND_UP, TREND_DOWN, RANGE, HIGH_VOL]

composition:
  entry_families: [TrendCore, RangeMR, BreakoutRetest, TrendPullback, FailedBreakoutFade]
  filter_packs: [safe, trend_baseline, range_baseline, breakout_baseline]
  exit_packs: [passthrough, protective, fixed_rr, atr_trail, partial_tp_runner, time_decay_exit]
  optional_filter_modules: [session_gate, trend_slope_gate, range_quality_gate]
  family_rules:
    TrendCore:
      filter_packs: [safe, trend_baseline]
      exit_packs: [passthrough, protective, atr_trail, time_decay_exit]
    RangeMR:
      filter_packs: [safe, range_baseline]
      exit_packs: [passthrough, protective, fixed_rr, partial_tp_runner]
    BreakoutRetest:
      filter_packs: [safe, breakout_baseline, trend_baseline]
      exit_packs: [passthrough, protective, atr_trail, partial_tp_runner]
    TrendPullback:
      filter_packs: [safe, trend_baseline]
      exit_packs: [passthrough, protective, atr_trail, fixed_rr]
    FailedBreakoutFade:
      filter_packs: [safe, range_baseline, breakout_baseline]
      exit_packs: [passthrough, protective, fixed_rr]

shared_params:
  base_confidence: [0.5, 0.54, 0.58, 0.62]

families:
  TrendCore:
    params:
      atr_stop_mult: [1.4, 1.8, 2.2, 2.8, 3.4]
      time_stop_bars: [6, 10, 14, 20, 28, 36]
  RangeMR:
    params:
      rsi_low: [28, 32, 35, 38, 42]
      rsi_high: [58, 62, 65, 68, 72]
      atr_stop_mult: [0.8, 1.0, 1.2, 1.5]
      take_profit_atr_mult: [0.1, 0.2, 0.35, 0.5]
  BreakoutRetest:
    params:
      min_range_compression: [0.15, 0.2, 0.3]
      min_trend_slope: [0.0003, 0.00045, 0.0006]
      min_reclaim_distance_atr: [0.01, 0.02, 0.05]
      max_retest_distance_atr: [0.25, 0.35, 0.5]
      atr_stop_mult: [1.5, 1.8, 2.2]
      long_rsi_min: [50, 52, 55]
      short_rsi_max: [45, 48, 50]
  TrendPullback:
    params:
      min_trend_slope: [0.00035, 0.0005, 0.00065]
      max_pullback_distance_atr: [0.3, 0.45, 0.6]
      max_chase_distance_atr: [0.5, 0.75, 1.0]
      atr_stop_mult: [1.8, 2.0, 2.4]
      long_rsi_pullback_min: [42, 45, 48]
      long_rsi_confirm_max: [60, 63, 66]
      short_rsi_confirm_min: [34, 37, 40]
      short_rsi_pullback_max: [52, 55, 58]
  FailedBreakoutFade:
    params:
      min_failed_breakout_distance_atr: [0.12, 0.18, 0.25]
      min_reversal_slope: [0.00025, 0.00035, 0.0005]
      min_range_compression: [0.1, 0.15, 0.25]
      atr_stop_mult: [1.2, 1.4, 1.8]
      fade_short_rsi_min: [54, 56, 60]
      fade_long_rsi_max: [40, 44, 48]

mutation:
  top_k_seeds: 2
  refinements_per_seed: 2
  plausible_min_score: 0.3
  max_parameter_changes: 2
  keep_composition_probability: 0.88

incubation:
  established_entry_families: [TrendCore, RangeMR]
  strict_candidate_kinds: [combination_candidate, new_family_candidate]

evaluation:
  min_in_sample_trades: 4
  min_out_sample_trades: 4
  min_out_sample_pnl: 0.0
  min_out_sample_sharpe: 0.0
  min_oos_is_pnl_ratio: 0.15
  max_turnover_per_bar: 350.0
  max_cost_to_gross_ratio: 0.85
  max_base_confidence: 0.75
